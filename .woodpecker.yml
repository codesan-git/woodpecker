# ─── Woodpecker CI — Deploy Pipeline ────────────────
# Binary app sudah di-build di laptop & di-commit.
# Pipeline tinggal: build image → deploy

when:
  - event: push
    branch: main
  - event: manual

steps:
  # ── Debug: cek Docker ──────────────────────────
  - name: debug
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker info 2>&1 | head -3 || echo "GAGAL"

  # ── Build Docker image ──────────────────────────
  - name: docker-build
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "🐳 Building..."
      - docker build -f Dockerfile.simple -t woodpecker-demo:latest .
      - echo "✅ Built"

  # ── Deploy ─────────────────────────────────────
  - name: docker-deploy
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "🔄 Deploying..."
      - docker stop woodpecker-demo 2>/dev/null || true
      - docker rm woodpecker-demo 2>/dev/null || true
      - docker run -d
          --name woodpecker-demo
          --restart unless-stopped
          -p 8080:8080
          woodpecker-demo:latest
      - echo "✅ Deployed"

  # ── Health check ───────────────────────────────
  - name: health-check
    image: curlimages/curl:latest
    failure: ignore
    commands:
      - sleep 2
      - curl -f http://host.docker.internal:8080/health
      - echo "✅ Healthy!"
