# ─── Woodpecker CI — Deploy Pipeline ────────────────
# Pipeline ini HANYA untuk deploy.
# Pull image dari GHCR → restart container → health check.
# Asumsi: GHCR package dibuat public (default dari workflow CI).
# Ganti IMAGE_NAME sesuai repo kamu.

when:
  - event: push
    branch: main
  - event: manual

steps:
  # ── Step 1: Pull image dari GHCR ────────────────
  - name: docker-pull
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "📥 Pulling latest image..."
      - docker pull ${IMAGE:-ghcr.io/USERNAME/woodpecker-demo}:latest
      - echo "✅ Image pulled!"

  # ── Step 2: Restart container ───────────────────
  - name: docker-deploy
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "🔄 Deploying..."
      - docker stop woodpecker-demo 2>/dev/null || true
      - docker rm woodpecker-demo 2>/dev/null || true
      - docker run -d
          --name woodpecker-demo
          --restart unless-stopped
          -p 8080:8080
          -e APP_VERSION=${CI_COMMIT_SHA:0:8}
          ${IMAGE:-ghcr.io/USERNAME/woodpecker-demo}:latest
      - echo "✅ Deployed!"

  # ── Step 3: Health check ────────────────────────
  - name: health-check
    image: curlimages/curl:latest
    failure: ignore
    commands:
      - echo "❤️ Checking health..."
      - sleep 2
      - curl -f http://host.docker.internal:8080/health
      - echo "✅ App is healthy!"
