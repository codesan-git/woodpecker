# ─── Woodpecker CI — Deploy Pipeline ────────────────
# Build binary → bikin Docker image → deploy

when:
  - event: push
    branch: main
  - event: manual

steps:
  # ── Step 1: Build binary ────────────────────────
  - name: build
    image: golang:1.23-alpine
    commands:
      - echo "📦 Building binary..."
      - go build -o app .
      - ls -lh app
      - echo "✅ Binary built"

  # ── Step 2: Build Docker image ──────────────────
  - name: docker-build
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "🐳 Building image..."
      - docker build -f Dockerfile.simple -t woodpecker-demo:latest .
      - echo "✅ Image built"

  # ── Step 3: Restart container ───────────────────
  - name: docker-deploy
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "🔄 Deploying..."
      - docker stop woodpecker-demo 2>/dev/null || true
      - docker rm woodpecker-demo 2>/dev/null || true
      - docker run -d
          --name woodpecker-demo
          --restart unless-stopped
          -p 8080:8080
          -e APP_VERSION=${CI_COMMIT_SHA:0:8}
          woodpecker-demo:latest
      - echo "✅ Deployed!"

  # ── Step 4: Health check ────────────────────────
  - name: health-check
    image: curlimages/curl:latest
    failure: ignore
    commands:
      - echo "❤️ Checking health..."
      - sleep 2
      - curl -f http://host.docker.internal:8080/health
      - echo "✅ Healthy!"
